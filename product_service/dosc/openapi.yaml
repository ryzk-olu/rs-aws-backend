openapi: 3.0.4

info:
  title: Product Service API
  description: API for managing products in the RS School online shop
  version: 1.0.0

servers:
  - url: https://de4dpsthh5.execute-api.us-east-1.amazonaws.com/prod/
    description: Production endpoint on AWS

paths:
  /products:
    get:
      summary: Get all products
      description: Returns the full list of available products
      operationId: getProductsList
      tags:
        - Products
      responses:
        '200':
          description: Successful response with list of products
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
              description: CORS header
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
              example:
                - id: "1"
                  title: "Pack of 10 stickers"
                  description: "Unique stickers with merch from RS School"
                  price: 5
                - id: "2"
                  title: "Yellow mug"
                  description: "A great mug with a sloth on it as a gift"
                  price: 10
                - id: "3"
                  title: "T-shirt with symbols"
                  description: "A recognizable T-shirt exclusively from RS School"
                  price: 20

  /products/{productId}:
    get:
      summary: Get product by ID
      description: Returns a single product by its identifier
      operationId: getProductsById
      tags:
        - Products
      parameters:
        - name: productId
          in: path
          required: true
          description: Unique identifier of the product
          schema:
            type: string
          example: "1"
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
              example:
                id: "1"
                title: "Pack of 10 stickers"
                description: "Unique stickers with merch from RS School"
                price: 5
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: "Product not found"

components:
  schemas:
    Product:
      type: object
      required:
        - id
        - title
        - description
        - price
      properties:
        id:
          type: string
          description: Unique identifier of the product
          example: "1"
        title:
          type: string
          description: Product name
          example: "Pack of 10 stickers"
        description:
          type: string
          description: Short product description
          example: "Unique stickers with merch from RS School"
        price:
          type: number
          minimum: 0
          description: Product price in USD
          example: 5

    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Error message describing what went wrong
          example: "Product not found"